name: CI

# Scope, deliberately: the fast gate — lint/typecheck/unit/build only, no
# external services, so it stays quick and never flakes. The Supabase-backed
# RLS/RPC integration suite and the Playwright E2E suite run separately in
# e2e.yml (they start a real Postgres via the Supabase CLI); a flake there
# must not block this gate.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
