name: CI

# Scope, deliberately: lint/typecheck/unit/build only. The RLS/RPC suite in
# web/tests/integration/ needs a real Supabase instance (see
# web/supabase/config.toml) and seeded test users — wiring that into CI is a
# separate follow-up, not done here. Until then, `npm run test:integration`
# stays a local/manual gate (see web/README.md).

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run build
